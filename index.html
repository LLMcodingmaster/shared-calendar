<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캘린더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">

    <div id="auth-screen" class="flex min-h-screen items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
            <h1 class="text-3xl font-bold text-center mb-8 text-indigo-600 tracking-tight">캘린더</h1>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">닉네임</label>
                    <input type="text" id="nickname-input" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="닉네임을 입력하세요">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">인증코드</label>
                    <input type="password" id="authcode-input" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="인증코드를 입력하세요">
                </div>
                <div class="flex gap-4 pt-4">
                    <button id="btn-create" class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200">새 캘린더 생성</button>
                    <button id="btn-join" class="flex-1 bg-white border-2 border-indigo-500 text-indigo-500 hover:bg-indigo-50 font-semibold py-2.5 px-4 rounded-lg transition duration-200">캘린더 접속</button>
                </div>
            </div>
        </div>
    </div>

    <div id="calendar-screen" class="hidden min-h-screen flex-col items-center py-8 p-4">
        <div class="w-full max-w-5xl bg-white p-6 rounded-xl shadow-lg">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-xl font-bold text-gray-800"><span id="display-nickname" class="text-indigo-600"></span>님의 캘린더</h2>
                <button id="btn-logout" class="text-sm text-gray-500 hover:text-red-500 transition duration-200 font-semibold">나가기</button>
            </div>
            <div class="flex justify-between items-center mb-4">
                <button id="btn-prev-month" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-semibold text-gray-600 transition duration-150">&lt; 이전</button>
                <h3 id="current-month-year" class="text-xl font-bold text-gray-800"></h3>
                <button id="btn-next-month" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-semibold text-gray-600 transition duration-150">다음 &gt;</button>
            </div>
            <div class="grid grid-cols-7 gap-2 mb-2 text-center font-bold text-gray-600">
                <div class="text-red-500">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-500">토</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
        </div>
    </div>

    <div id="event-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-7 rounded-xl shadow-2xl w-full max-w-md">
            <h3 class="text-xl font-bold mb-5 text-gray-800" id="modal-title">일정 추가</h3>
            
            <input type="text" id="event-input" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none mb-4 font-medium" placeholder="일정 이름 (예: 가족 여행)" required>
            
            <div class="mb-4">
                <span class="block text-sm font-bold text-gray-700 mb-2">일정 색상</span>
                <div id="color-picker" class="flex flex-wrap gap-2"></div>
            </div>

            <label class="flex items-center mb-4 cursor-pointer w-fit group">
                <input type="checkbox" id="is-allday" class="w-5 h-5 text-indigo-600 rounded cursor-pointer border-gray-300 focus:ring-indigo-500">
                <span class="ml-2 text-sm font-bold text-gray-700 group-hover:text-indigo-600 transition-colors">하루종일 (시간 생략)</span>
            </label>

            <div class="flex flex-col gap-4 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-200">
                <div class="flex items-center justify-between gap-3">
                    <span class="text-sm font-bold text-gray-700 w-8">시작</span>
                    <input type="date" id="start-date" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm w-full">
                    <input type="time" id="start-time" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm w-full cursor-text">
                </div>
                <div class="flex items-center justify-between gap-3">
                    <span class="text-sm font-bold text-gray-700 w-8">종료</span>
                    <input type="date" id="end-date" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm w-full">
                    <input type="time" id="end-time" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm w-full cursor-text">
                </div>
            </div>

            <div class="flex justify-between items-center mt-2">
                <button id="btn-delete-event" class="hidden px-4 py-2.5 text-red-600 bg-red-50 hover:bg-red-100 font-bold rounded-lg transition duration-200">삭제</button>
                <div class="flex justify-end gap-3 w-full">
                    <button id="btn-close-modal" class="px-5 py-2.5 text-gray-700 bg-gray-200 hover:bg-gray-300 font-bold rounded-lg transition duration-200">취소</button>
                    <button id="btn-save-event" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition duration-200">저장</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB9kupArquAXbcZPGMkopPhkpWO3LYQ15Q",
            authDomain: "calendar-9e360.firebaseapp.com",
            projectId: "calendar-9e360",
            storageBucket: "calendar-9e360.firebasestorage.app",
            messagingSenderId: "28217808964",
            appId: "1:28217808964:web:16a28f364feb97bd8ac411"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 15가지 색상 맵핑 (Tailwind 클래스 및 색상코드)
        const colorMap = {
            red: { bg: 'bg-red-100', text: 'text-red-800', border: 'border-red-200', hex: '#fee2e2' },
            orange: { bg: 'bg-orange-100', text: 'text-orange-800', border: 'border-orange-200', hex: '#ffedd5' },
            amber: { bg: 'bg-amber-100', text: 'text-amber-800', border: 'border-amber-200', hex: '#fef3c7' },
            green: { bg: 'bg-green-100', text: 'text-green-800', border: 'border-green-200', hex: '#dcfce3' },
            emerald: { bg: 'bg-emerald-100', text: 'text-emerald-800', border: 'border-emerald-200', hex: '#d1fae5' },
            teal: { bg: 'bg-teal-100', text: 'text-teal-800', border: 'border-teal-200', hex: '#ccfbf1' },
            cyan: { bg: 'bg-cyan-100', text: 'text-cyan-800', border: 'border-cyan-200', hex: '#cffafe' },
            blue: { bg: 'bg-blue-100', text: 'text-blue-800', border: 'border-blue-200', hex: '#dbeafe' },
            indigo: { bg: 'bg-indigo-100', text: 'text-indigo-800', border: 'border-indigo-200', hex: '#e0e7ff' },
            violet: { bg: 'bg-violet-100', text: 'text-violet-800', border: 'border-violet-200', hex: '#ede9fe' },
            purple: { bg: 'bg-purple-100', text: 'text-purple-800', border: 'border-purple-200', hex: '#f3e8ff' },
            fuchsia: { bg: 'bg-fuchsia-100', text: 'text-fuchsia-800', border: 'border-fuchsia-200', hex: '#fae8ff' },
            pink: { bg: 'bg-pink-100', text: 'text-pink-800', border: 'border-pink-200', hex: '#fce7f3' },
            rose: { bg: 'bg-rose-100', text: 'text-rose-800', border: 'border-rose-200', hex: '#ffe4e6' },
            gray: { bg: 'bg-gray-200', text: 'text-gray-800', border: 'border-gray-300', hex: '#e5e7eb' }
        };

        let currentCalendar = null; 
        let currentCalendarData = null; 
        let currentDate = new Date(); 
        let unsubscribe = null; 
        
        let editingEventId = null; // 수정 중인 일정 ID 저장
        let selectedColor = 'indigo'; // 기본 색상

        const authScreen = document.getElementById('auth-screen');
        const calendarScreen = document.getElementById('calendar-screen');
        const nicknameInput = document.getElementById('nickname-input');
        const authcodeInput = document.getElementById('authcode-input');
        const displayNickname = document.getElementById('display-nickname');
        const calendarGrid = document.getElementById('calendar-grid');
        const currentMonthYear = document.getElementById('current-month-year');
        
        const eventModal = document.getElementById('event-modal');
        const modalTitle = document.getElementById('modal-title');
        const eventInput = document.getElementById('event-input');
        const isAllDayCheck = document.getElementById('is-allday');
        const startDateInput = document.getElementById('start-date');
        const startTimeInput = document.getElementById('start-time');
        const endDateInput = document.getElementById('end-date');
        const endTimeInput = document.getElementById('end-time');
        const btnDeleteEvent = document.getElementById('btn-delete-event');
        const colorPicker = document.getElementById('color-picker');

        // 색상 팔레트 UI 생성
        Object.keys(colorMap).forEach(color => {
            const circle = document.createElement('div');
            circle.className = `w-6 h-6 rounded-full cursor-pointer border-2 border-transparent transition-transform hover:scale-110 shadow-sm`;
            circle.style.backgroundColor = colorMap[color].hex;
            circle.dataset.color = color;
            circle.addEventListener('click', () => selectColor(color));
            colorPicker.appendChild(circle);
        });

        function selectColor(color) {
            selectedColor = color;
            Array.from(colorPicker.children).forEach(child => {
                if (child.dataset.color === color) {
                    child.classList.add('border-gray-500', 'scale-110');
                } else {
                    child.classList.remove('border-gray-500', 'scale-110');
                }
            });
        }

        isAllDayCheck.addEventListener('change', (e) => {
            if (e.target.checked) {
                startTimeInput.classList.add('opacity-30', 'pointer-events-none');
                endTimeInput.classList.add('opacity-30', 'pointer-events-none');
            } else {
                startTimeInput.classList.remove('opacity-30', 'pointer-events-none');
                endTimeInput.classList.remove('opacity-30', 'pointer-events-none');
            }
        });

        startDateInput.addEventListener('change', (e) => {
            if(endDateInput.value < e.target.value) {
                endDateInput.value = e.target.value;
            }
        });

        document.getElementById('btn-create').addEventListener('click', async () => {
            const nickname = nicknameInput.value.trim();
            const authcode = authcodeInput.value.trim();
            if (!nickname || !authcode) return alert("닉네임과 인증코드를 모두 입력해주세요.");

            try {
                const docRef = db.collection("calendars").doc(nickname);
                const docSnap = await docRef.get();
                if (docSnap.exists) return alert("이미 존재하는 닉네임입니다.");

                await docRef.set({ authCode: authcode, eventList: [] });
                enterCalendar(nickname);
            } catch (error) {
                alert("생성 중 오류가 발생했습니다.");
            }
        });

        document.getElementById('btn-join').addEventListener('click', async () => {
            const nickname = nicknameInput.value.trim();
            const authcode = authcodeInput.value.trim();
            if (!nickname || !authcode) return alert("닉네임과 인증코드를 모두 입력해주세요.");

            try {
                const docRef = db.collection("calendars").doc(nickname);
                const docSnap = await docRef.get();
                if (!docSnap.exists) return alert("존재하지 않는 캘린더입니다.");
                if (docSnap.data().authCode !== authcode) return alert("인증코드가 일치하지 않습니다.");

                enterCalendar(nickname);
            } catch (error) {
                alert("접속 중 오류가 발생했습니다.");
            }
        });

        function enterCalendar(nickname) {
            currentCalendar = nickname;
            displayNickname.innerText = nickname;
            nicknameInput.value = ''; authcodeInput.value = '';
            
            authScreen.classList.add('hidden');
            calendarScreen.classList.remove('hidden');
            calendarScreen.classList.add('flex');
            currentDate = new Date();

            const docRef = db.collection("calendars").doc(nickname);
            unsubscribe = docRef.onSnapshot((docSnap) => {
                if (docSnap.exists) {
                    currentCalendarData = docSnap.data();
                    if(!Array.isArray(currentCalendarData.eventList)) {
                        currentCalendarData.eventList = [];
                    }
                    renderCalendar(); 
                }
            });
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            if (unsubscribe) unsubscribe(); 
            currentCalendar = null; currentCalendarData = null;
            calendarScreen.classList.add('hidden');
            calendarScreen.classList.remove('flex');
            authScreen.classList.remove('hidden');
        });

        function renderCalendar() {
            if (!currentCalendarData) return;

            calendarGrid.innerHTML = ''; 
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth(); 
            currentMonthYear.innerText = `${year}년 ${month + 1}월`;

            const firstDay = new Date(year, month, 1).getDay(); 
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            const eventList = currentCalendarData.eventList;

            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = "h-32 bg-gray-50 border border-gray-100 rounded-lg";
                calendarGrid.appendChild(emptyCell);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateCell = document.createElement('div');
                dateCell.className = "h-32 border border-gray-200 rounded-lg p-1 flex flex-col hover:bg-indigo-50 cursor-pointer transition duration-150 overflow-y-auto no-scrollbar relative shadow-sm";
                
                const monthStr = String(month + 1).padStart(2, '0');
                const dayStr = String(day).padStart(2, '0');
                const fullDateStr = `${year}-${monthStr}-${dayStr}`;

                const dayNumber = document.createElement('div');
                dayNumber.className = "text-sm font-extrabold mb-1 px-1 " + (new Date(year, month, day).getDay() === 0 ? "text-red-500" : new Date(year, month, day).getDay() === 6 ? "text-blue-500" : "text-gray-700");
                dayNumber.innerText = day;
                dateCell.appendChild(dayNumber);

                const todaysEvents = eventList.filter(ev => fullDateStr >= ev.startDate && fullDateStr <= ev.endDate);

                todaysEvents.sort((a, b) => {
                    if (a.isAllDay && !b.isAllDay) return -1;
                    if (!a.isAllDay && b.isAllDay) return 1;
                    return (a.startTime || "00:00").localeCompare(b.startTime || "00:00");
                });

                todaysEvents.forEach(ev => {
                    const eventItem = document.createElement('div');
                    const c = colorMap[ev.color || 'indigo']; // 색상 매핑 (없으면 기본 indigo)
                    
                    eventItem.className = ev.isAllDay 
                        ? `text-[11px] ${c.bg} ${c.text} rounded px-1.5 py-1 mb-1 w-full leading-tight truncate border ${c.border} cursor-pointer hover:opacity-80`
                        : `text-[11px] ${c.bg} ${c.text} rounded px-1.5 py-1 mb-1 w-full leading-tight truncate font-medium cursor-pointer hover:opacity-80`;
                    
                    // 툴팁 텍스트 (마우스 올려둘 때도 상세 정보 표시)
                    const tooltipText = ev.isAllDay 
                        ? `[${ev.title}]\n시작: ${ev.startDate} (하루종일)\n종료: ${ev.endDate} (하루종일)`
                        : `[${ev.title}]\n시작: ${ev.startDate} ${ev.startTime}\n종료: ${ev.endDate} ${ev.endTime}`;
                    eventItem.setAttribute('title', tooltipText);

                    // 텍스트 렌더링 로직 (24시간제로 심플하게 표시)
                    let displayText = '';
                    if (ev.isAllDay) {
                        displayText = `<span class="font-bold mr-1 opacity-80">하루종일</span>${ev.title}`;
                    } else {
                        if (fullDateStr === ev.startDate && fullDateStr === ev.endDate) {
                            displayText = `<span class="font-extrabold mr-1 opacity-70">${ev.startTime}</span>${ev.title}`;
                        } else if (fullDateStr === ev.startDate) {
                            displayText = `<span class="font-extrabold mr-1 opacity-70">${ev.startTime}</span>${ev.title}`;
                        } else if (fullDateStr === ev.endDate) {
                            displayText = `<span class="font-extrabold mr-1 opacity-70">${ev.endTime}</span>${ev.title}`;
                        } else {
                            displayText = `${ev.title}`;
                        }
                    }

                    eventItem.innerHTML = displayText;
                    
                    // ★ 일정 클릭 시 상세/수정 모달 띄우기
                    eventItem.addEventListener('click', (e) => {
                        e.stopPropagation(); // 배경 날짜 클릭 이벤트 무시
                        openEditModal(ev);
                    });

                    dateCell.appendChild(eventItem);
                });

                // 빈 칸 클릭 시 새 일정 추가 모달 열기
                dateCell.addEventListener('click', () => openNewModal(fullDateStr));
                calendarGrid.appendChild(dateCell);
            }
        }

        document.getElementById('btn-prev-month').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); });
        document.getElementById('btn-next-month').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); });

        // [새 일정 추가] 모달 열기
        function openNewModal(dateStr) {
            editingEventId = null;
            modalTitle.innerText = "새 일정 추가";
            eventInput.value = ''; 
            
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const endNow = new Date(now.getTime() + 60 * 60 * 1000); 
            const endHours = String(endNow.getHours()).padStart(2, '0');
            const endMinutes = String(endNow.getMinutes()).padStart(2, '0');

            startDateInput.value = dateStr;
            endDateInput.value = dateStr;
            startTimeInput.value = `${hours}:${minutes}`;
            endTimeInput.value = `${endHours}:${endMinutes}`;

            isAllDayCheck.checked = false;
            isAllDayCheck.dispatchEvent(new Event('change'));
            selectColor('indigo'); // 기본 색상

            btnDeleteEvent.classList.add('hidden'); // 삭제 버튼 숨김
            eventModal.classList.remove('hidden');
            setTimeout(() => eventInput.focus(), 50); 
        }

        // [기존 일정 수정/상세] 모달 열기
        function openEditModal(ev) {
            editingEventId = ev.id;
            modalTitle.innerText = "일정 상세 및 수정";
            eventInput.value = ev.title;
            startDateInput.value = ev.startDate;
            endDateInput.value = ev.endDate;
            startTimeInput.value = ev.startTime || "";
            endTimeInput.value = ev.endTime || "";
            
            isAllDayCheck.checked = ev.isAllDay;
            isAllDayCheck.dispatchEvent(new Event('change'));
            selectColor(ev.color || 'indigo');

            btnDeleteEvent.classList.remove('hidden'); // 삭제 버튼 표시
            eventModal.classList.remove('hidden');
        }

        document.getElementById('btn-close-modal').addEventListener('click', () => {
            eventModal.classList.add('hidden');
        });

        // 저장(또는 수정) 버튼 클릭
        document.getElementById('btn-save-event').addEventListener('click', async () => {
            const title = eventInput.value.trim();
            const startDate = startDateInput.value;
            const endDate = endDateInput.value;
            const startTime = startTimeInput.value;
            const endTime = endTimeInput.value;
            const isAllDay = isAllDayCheck.checked;

            if (!title) return alert("일정 이름을 입력하세요.");
            if (!startDate || !endDate) return alert("날짜를 정확히 선택하세요.");
            if (!isAllDay && (!startTime || !endTime)) return alert("시작 및 종료 시간을 입력하세요.");
            
            if (startDate > endDate) {
                return alert("종료 날짜가 시작 날짜보다 빠를 수 없습니다.");
            }
            if (!isAllDay && startDate === endDate && startTime > endTime) {
                return alert("종료 시간이 시작 시간보다 빠를 수 없습니다.");
            }

            const newEvent = {
                id: editingEventId || Date.now().toString(), // 기존 ID 유지 또는 새 ID 발급
                title: title,
                startDate: startDate,
                endDate: endDate,
                startTime: isAllDay ? "" : startTime,
                endTime: isAllDay ? "" : endTime,
                isAllDay: isAllDay,
                color: selectedColor // 선택된 색상 저장
            };

            let updatedEventList;
            if (editingEventId) {
                // 수정 모드: 기존 일정 업데이트
                updatedEventList = currentCalendarData.eventList.map(e => e.id === editingEventId ? newEvent : e);
            } else {
                // 추가 모드: 새 일정 삽입
                updatedEventList = [...currentCalendarData.eventList, newEvent];
            }

            document.getElementById('btn-close-modal').click();
            const docRef = db.collection("calendars").doc(currentCalendar);
            await docRef.set({ eventList: updatedEventList }, { merge: true });
        });

        // 삭제 버튼 클릭
        document.getElementById('btn-delete-event').addEventListener('click', async () => {
            if (!confirm("이 일정을 정말 삭제하시겠습니까?")) return;

            const updatedEventList = currentCalendarData.eventList.filter(e => e.id !== editingEventId);

            document.getElementById('btn-close-modal').click();
            const docRef = db.collection("calendars").doc(currentCalendar);
            await docRef.set({ eventList: updatedEventList }, { merge: true });
        });
    </script>
</body>
</html>
